services:
    audiobookshelf:
      image: advplyr/audiobookshelf:latest
      container_name: audiobookshelf
      ports:
        - 13378:80
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=America/Chicago
      volumes:
        - /home/chiefbash/docker/audiobookshelf/config:/config
        - /home/chiefbash/docker/audiobookshelf/metadata:/metadata
        - /mnt/HDD15/books/audiobooks:/audiobooks
      restart: unless-stopped
    kavita:
      image: lscr.io/linuxserver/kavita:latest
      container_name: kavita
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=America/Chicago
      volumes:
        - /home/chiefbash/docker/kavita/config:/config
        - /mnt/HDD15/books/books:/books
        - /mnt/HDD15/books/comics:/comics
        - /mnt/HDD15/books/manga:/manga
      ports:
        - 5000:5000
      restart: unless-stopped
    plex:
      image: lscr.io/linuxserver/plex:latest
      container_name: plex
      network_mode: host
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=America/Chicago
        - VERSION=docker
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      volumes:
        - /mnt/HDD15/plex:/config
        - /mnt/HDD15/plex/movies:/movies
        - /mnt/HDD15/plex/shows:/shows
        - /mnt/HDD15/plex/videos:/videos
      restart: unless-stopped
