services:
  audiobookshelf:
    image: advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - 13378:80
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./audiobookshelf:/config
      - ./audiobookshelf/metadata:/metadata
      - /mnt/HDD1/media/books/audiobooks:/audiobooks
    restart: unless-stopped

  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./kavita:/config
      - /mnt/HDD1/media/books/books:/books
      - /mnt/HDD1//media/books/comics:/comics
      - /mnt/HDD1/media/books/manga:/manga
    ports:
      - 5000:5000
    restart: unless-stopped
