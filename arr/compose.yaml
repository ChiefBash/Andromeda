services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: homarr
    environment:
      - TZ=America/Chicago
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/homarr:/config
      - /docker/homarr/data:/data
    ports:
      - 7575:7575
    restart: unless-stopped
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/bazarr:/config
      - /mnt/HDD1/plex/movies:/movies
      - /mnt/HDD1/plex/shows:/shows
    ports:
      - 6767:6767
    restart: unless-stopped
  
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/lidarr:/config
      - /mnt/HDD1/music:/music
      - /mnt/HDD5/downloads:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped
  
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/radarr:/config
      - /mnt/HDD1/plex/movies:/movies
      - /mnt/HDD5/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
  
  readarr:
    image: lscr.io/linuxserver/readarr:0.4.19-nightly
    container_name: readarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/readarr:/config
      - /mnt/HDD1/books/:/books
      - /mnt/HDD5/downloads:/downloads
    ports:
      - 8787:8787
    restart: unless-stopped

  seerr:
    image: seerr/seerr:develop
    container_name: seerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/seerr:/config
    ports:
      - 5055:5055
    restart: unless-stopped
  
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /docker/sonarr:/config
      - /mnt/HDD1/plex/shows:/shows
      - /mnt/HDD5/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
